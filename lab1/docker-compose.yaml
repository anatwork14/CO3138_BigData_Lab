services:
  broker-1:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    ports:
      - 9092:9092
    volumes:
      - broker-1-data:/bitnami/kafka
    environment:
      # The shared cluster identity that all brokers must agree on
      - KAFKA_KRAFT_CLUSTER_ID=ahihidongoc
      # This broker's unique node number in the cluster
      - KAFKA_CFG_NODE_ID=1
      # This node participates as both controller and broker
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      # The complete roster of all voting members
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
      # Define the network interfaces this broker listens on
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      # Tell clients and other brokers how to reach this specific broker
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://broker-1:9094
      # Map listener names to their security protocols
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      # The controller listener is used only for consensus operations
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Brokers communicate with each other using the internal listener
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    profiles:
      - kafka

  broker-2:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    ports:
      - 9192:9092
    volumes:
      - broker-2-data:/bitnami/kafka
    environment:
      # Critical: Same cluster ID as broker-1
      - KAFKA_KRAFT_CLUSTER_ID=ahihidongoc
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9192,INTERNAL://broker-2:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    profiles:
      - kafka

  broker-3:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    ports:
      - 9292:9092
    volumes:
      - broker-3-data:/bitnami/kafka
    environment:
      # Critical: Same cluster ID as brokers 1 and 2
      - KAFKA_KRAFT_CLUSTER_ID=ahihidongoc
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9292,INTERNAL://broker-3:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    profiles:
      - kafka

volumes:
  broker-1-data:
  broker-2-data:
  broker-3-data:
